<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prueba</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
      text-align: center;
      max-width: 600px;
    }
    h1 {
      margin-top: 0;
      color: #c00000;
    }
    p {
      color: #333;
      line-height: 1.5;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #c00000;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }
    .btn:hover {
      opacity: .9;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Prueba</h1>
    <p>Hola David, esta página ya está en Openshift</p>
    <a class="btn" href="#">Funciona</a>
  </div>
</body>
</html>
