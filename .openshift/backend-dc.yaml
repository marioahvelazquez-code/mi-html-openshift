apiVersion: apps.openshift.io/v1
kind: DeploymentConfig
metadata:
  name: backend
  namespace: marioahvelazquez-dev
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    app: backend
    deploymentconfig: backend
  strategy:
    type: Rolling
    rollingParams:
      updatePeriodSeconds: 1
      intervalSeconds: 1
      timeoutSeconds: 600
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: backend
        deploymentconfig: backend
    spec:
      containers:
      - name: backend
        image: image-registry.openshift-image-registry.svc:5000/default/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          protocol: TCP
        env:
        - name: DEBUG
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: DEBUG
        - name: ALLOWED_HOSTS
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: ALLOWED_HOSTS
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: django-secrets
              key: SECRET_KEY
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: django-secrets
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: django-secrets
              key: DB_USER
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: django-secrets
              key: DB_PASS
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: django-secrets
              key: DB_HOST
        livenessProbe:
          httpGet:
            path: /admin/
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /admin/
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 250m
            memory: 256Mi
      restartPolicy: Always
  triggers:
  - type: ConfigChange
  - type: ImageChange
    imageChangeParams:
      automatic: true
      containerNames:
      - backend
      from:
        kind: ImageStreamTag
        name: backend:latest
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: marioahvelazquez-dev
  labels:
    app: backend
spec:
  ports:
  - name: 8000-tcp
    port: 8000
    targetPort: 8000
  selector:
    app: backend
    deploymentconfig: backend
  type: ClusterIP
